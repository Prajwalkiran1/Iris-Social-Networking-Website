# Serves the built SPA and proxies the API to the backend container so the
# browser talks to a single origin (no CORS, no VITE_API_BASE_URL needed).
server {
    listen 80;
    server_name _;

    # Forward API calls to the backend service on the compose network.
    location /api/ {
        proxy_pass http://backend:5001/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
    }

    # SPA: serve static assets, fall back to index.html for client routes.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
