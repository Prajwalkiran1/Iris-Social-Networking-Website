# Local application stack deployed by the Jenkins "Deploy" stage.
# Brings up the full app on your machine: Neo4j + backend API + nginx-served
# frontend. Jenkins runs `docker compose -f infra/app/docker-compose.yml up -d
# --build`; the Monitor stage then polls the backend health endpoint.
#
# Standalone use (without Jenkins):
#   docker compose -f infra/app/docker-compose.yml up -d --build
#   open http://localhost:8081
services:
  neo4j:
    image: neo4j:5
    container_name: iris-app-neo4j
    environment:
      - NEO4J_AUTH=neo4j/password123
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data

  backend:
    build:
      context: ../../backend
    container_name: iris-app-backend
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
      NEO4J_DATABASE: neo4j
      # Firebase project id is enough for ID-token verification (no secret).
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-iris-social-3c4bd}
      FRONTEND_ORIGIN: http://localhost:8081
      PORT: "5001"
    ports:
      - "5001:5001"
    depends_on:
      - neo4j

  frontend:
    build:
      context: ../../frontend
      args:
        # Firebase WEB config — public client identifiers (the same values ship
        # in the live Vercel bundle; Firebase is designed for them to be
        # client-visible, with security enforced by Auth rules + authorized
        # domains). Baked as defaults so the pipeline builds a working app from
        # a clean checkout; an infra/app/.env still overrides them if present.
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-AIzaSyBZlUSVrVHzgDh9cAxZeM0UeGMpGTVlhvQ}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-iris-social-3c4bd.firebaseapp.com}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-iris-social-3c4bd}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-iris-social-3c4bd.firebasestorage.app}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-974017489478}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-1:974017489478:web:34fa3e69e0cdfeddb73847}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID:-G-NL9BV55EV4}
    container_name: iris-app-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  neo4j_data:
