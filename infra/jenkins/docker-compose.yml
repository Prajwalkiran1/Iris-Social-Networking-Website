# One-command, reproducible Jenkins controller for the Iris pipeline.
#
#   cd infra/jenkins
#   docker compose up -d --build
#   # open http://localhost:8080 and unlock with:
#   docker compose exec jenkins cat /var/jenkins_home/secrets/initialAdminPassword
#
# `docker compose down -v` wipes the volume for a clean-from-scratch rebuild.
services:
  jenkins:
    build: .
    image: iris-jenkins:lts-node20
    container_name: iris-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"     # Jenkins web UI
      - "50000:50000"   # inbound agent port
    volumes:
      - jenkins_home:/var/jenkins_home

volumes:
  jenkins_home:
