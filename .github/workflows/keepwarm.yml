name: Keep backend warm

# Render's free tier sleeps after ~15 min idle (≈50s cold start). Pinging
# /api/health every 10 min keeps the live demo responsive. Set the repo
# Actions variable BACKEND_HEALTH_URL to your deployed health endpoint, e.g.
# https://iris-api.onrender.com/api/health  (no-op until it's set).
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="${{ vars.BACKEND_HEALTH_URL }}"
          if [ -z "$URL" ]; then
            echo "BACKEND_HEALTH_URL not set — skipping."
            exit 0
          fi
          curl -fsS --max-time 60 "$URL" && echo " — ok"
